name: API Tests (Newman)

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'server/**'
      - 'tests/postman/**'

jobs:
  api-tests:
    name: Run Newman API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Start test server
        working-directory: server
        env:
          NODE_ENV: test
          PORT: 5000
          MONGODB_URI: mongodb://localhost:27017/crm_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          CLIENT_URL: http://localhost:5173
        run: |
          node server.js &
          echo $! > /tmp/server.pid

      - name: Wait for server health check
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5000/api/health | grep -q '"ok"'; then
              echo "✅ Server is healthy"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run Newman tests
        run: |
          newman run tests/postman/CRM_API_Tests.postman_collection.json \
            --environment tests/postman/envs/CRM_Local.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export tests/reports/api-test-report.html \
            --timeout-request 10000

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: tests/reports/api-test-report.html
          retention-days: 30

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) 2>/dev/null || true
          fi
